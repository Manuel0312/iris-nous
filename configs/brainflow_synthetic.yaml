# Example: use BrainFlow SyntheticBoard instead of the NumPy simulator.
# Requires: pip install -e ".[acquisition]"

acquisition:
  source: brainflow_synthetic
  sample_rate_hz: 250
  n_channels: 8
  window_seconds: 1.0
  window_overlap: 0.5

preprocessing:
  bandpass_hz: [1.0, 40.0]
  notch_hz: 50.0
  alpha_band_hz: [8.0, 12.0]
  beta_band_hz: [13.0, 30.0]

ml:
  model_path: models/baseline.joblib
  confidence_threshold: 0.55

router:
  debounce_windows: 3
  default_context: music_mode

integrations:
  dry_run: true
  home_assistant_url: ""
  spotify_enabled: false

accounts:
  require_login: true
  data_dir: data/profiles
