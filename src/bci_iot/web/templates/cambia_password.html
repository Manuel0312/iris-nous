{% extends "base.html" %}
{% block title %}Cambia password · Iris{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>Cambia password</h1>
  <p class="lede">Livello minimo richiesto: <strong>medio</strong> (8+ caratteri, una maiuscola, un numero).</p>
  <form method="post" action="/cambia-password" class="stack" id="pwd-form">
    <label>Password attuale
      <div class="password-field">
        <input id="cur-password" name="current_password" type="password" autocomplete="current-password" required />
        <button type="button" class="password-toggle" data-toggle-password="cur-password" title="Passa il mouse per vedere (su telefono: tocca)" aria-label="Mostra password" aria-pressed="false">
          <span class="eye-show" aria-hidden="true"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg></span>
          <span class="eye-hide" aria-hidden="true" hidden><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3l18 18"/><path d="M10.6 10.6a2.5 2.5 0 0 0 3.5 3.5"/><path d="M7 7.2C4.7 8.7 3 12 3 12s3.5 7 10 7a11 11 0 0 0 5-1.2"/><path d="M14.1 5.2A11 11 0 0 1 13 5c-6.5 0-10 7-10 7a18 18 0 0 0 2.2 3.1"/></svg></span>
        </button>
      </div>
    </label>
    <label>Nuova password
      <div class="password-field">
        <input id="new-password" name="new_password" type="password" autocomplete="new-password" required minlength="8" />
        <button type="button" class="password-toggle" data-toggle-password="new-password" title="Passa il mouse per vedere (su telefono: tocca)" aria-label="Mostra password" aria-pressed="false">
          <span class="eye-show" aria-hidden="true"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg></span>
          <span class="eye-hide" aria-hidden="true" hidden><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3l18 18"/><path d="M10.6 10.6a2.5 2.5 0 0 0 3.5 3.5"/><path d="M7 7.2C4.7 8.7 3 12 3 12s3.5 7 10 7a11 11 0 0 0 5-1.2"/><path d="M14.1 5.2A11 11 0 0 1 13 5c-6.5 0-10 7-10 7a18 18 0 0 0 2.2 3.1"/></svg></span>
        </button>
      </div>
    </label>
    <p class="strength-meter" id="strength-meter" data-level="weak">Livello: debole</p>
    <label>Ripeti nuova password
      <input id="new-password2" name="new_password2" type="password" autocomplete="new-password" required minlength="8" />
    </label>
    <button class="btn primary" type="submit">Aggiorna password</button>
  </form>
</section>
<script>
(function () {
  const input = document.getElementById("new-password");
  const meter = document.getElementById("strength-meter");
  if (!input || !meter) return;
  async function check() {
    const res = await fetch("/api/password-strength?password=" + encodeURIComponent(input.value));
    const data = await res.json();
    meter.dataset.level = data.level;
    meter.textContent = data.message;
  }
  input.addEventListener("input", check);
})();
</script>
{% endblock %}
