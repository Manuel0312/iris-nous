services:
  - type: web
    name: iris-nous
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BCI_IOT_SESSION_SECRET
        generateValue: true
      - key: BCI_IOT_ADMIN_USERNAME
        value: admin
      - key: BCI_IOT_ADMIN_PASSWORD
        generateValue: true
      - key: BCI_IOT_HTTPS
        value: "1"
      - key: BCI_IOT_DATA_DIR
        value: /data
      - key: BCI_IOT_PUBLIC_URL
        value: https://iris-nous.onrender.com
      - key: BCI_IOT_SPOTIFY_CLIENT_ID
        sync: false
      - key: BCI_IOT_SPOTIFY_CLIENT_SECRET
        sync: false
      - key: BCI_IOT_SPOTIFY_REDIRECT_URI
        value: https://iris-nous.onrender.com/auth/spotify/callback
